# New-API Docker Compose Configuration (MySQL版本)
# 
# Quick Start:
#   1. 修改下面标记 ⚠️ 的密码
#   2. docker-compose up -d
#   3. 访问 http://localhost:3000
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

version: '3.4' # For compatibility with older Docker versions

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=root:YourStrongPassword123!@tcp(mysql:3306)/new-api
      - REDIS_CONN_STRING=redis://:YourRedisPassword456!@redis:6379 # ⚠️ IMPORTANT: Change the password in production!
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
      - NODE_NAME=new-api-node-1  # 节点名称，用于审计日志中标识节点身份；多节点/容器部署时建议设�?(Node name used in audit logs; recommended when running multiple instances or in containers)
#      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默�?20秒，如果出现空补全可以尝试改为更大�?（Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions�?#      - SESSION_SECRET=random_string  # 多机部署时设置，必须修改这个随机字符串！�?（multi-node deployment, set this to a random string!!!!!!!�?#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 的测�?ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    depends_on:
      - redis
      - mysql
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "YourRedisPassword456!"]  # ⚠️ IMPORTANT: Change this password in production!
    networks:
      - new-api-network

  mysql:
    image: mysql:8.2
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: YourStrongPassword123!  # ⚠️ IMPORTANT: Change this password in production!
      MYSQL_DATABASE: new-api
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - new-api-network
    # 如果需要从外部访问MySQL，取消注释下面的端口映射
    # ports:
    #   - "3306:3306"

volumes:
  mysql_data:

networks:
  new-api-network:
    driver: bridge
